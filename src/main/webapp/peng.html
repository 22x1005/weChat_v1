<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>好友动态 - WeChat v1</title>
<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.1.1/jquery.min.js"></script>
<script src="peng.js"></script>
<style>
  :root {
    --green: #17b26a;
    --green-dark: #0f8f56;
    --blue: #3b82f6;
    --ink: #1f2937;
    --muted: #6b7280;
    --line: #e5e7eb;
    --soft: #f8fafc;
    --surface: rgba(255, 255, 255, 0.94);
    --shadow: 0 18px 50px rgba(15, 23, 42, 0.1);
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    font-family: "Segoe UI", "Microsoft YaHei", Arial, sans-serif;
    color: var(--ink);
    background:
      radial-gradient(circle at 8% 8%, rgba(23, 178, 106, 0.15), transparent 28%),
      radial-gradient(circle at 92% 12%, rgba(59, 130, 246, 0.13), transparent 28%),
      linear-gradient(135deg, #f7fbf8, #f8fafc);
  }

  .page {
    width: min(1120px, calc(100% - 32px));
    margin: 0 auto;
    padding: 24px 0 48px;
  }

  .topbar,
  .section-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 20px;
  }

  .topbar { margin-bottom: 26px; }
  .section-head { margin-bottom: 22px; }

  .brand {
    display: flex;
    align-items: center;
    gap: 10px;
    font-weight: 800;
  }

  .brand-mark {
    display: grid;
    place-items: center;
    width: 38px;
    height: 38px;
    border-radius: 10px;
    color: #fff;
    background: linear-gradient(135deg, var(--green), var(--blue));
    box-shadow: 0 10px 24px rgba(23, 178, 106, 0.24);
  }

  nav {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: flex-end;
  }

  nav a,
  .publish-link {
    color: var(--muted);
    text-decoration: none;
    padding: 9px 12px;
    border-radius: 8px;
    font-size: 14px;
  }

  nav a:hover,
  nav a.active,
  .publish-link:hover {
    color: var(--green-dark);
    background: rgba(23, 178, 106, 0.1);
  }

  .publish-link {
    color: #fff;
    font-weight: 800;
    background: linear-gradient(135deg, var(--green), var(--green-dark));
    box-shadow: 0 12px 28px rgba(23, 178, 106, 0.22);
  }

  .publish-link:hover {
    color: #fff;
    background: linear-gradient(135deg, var(--green), var(--green-dark));
  }

  .content {
    background: var(--surface);
    border: 1px solid rgba(255, 255, 255, 0.76);
    border-radius: 8px;
    box-shadow: var(--shadow);
    padding: 30px;
    backdrop-filter: blur(16px);
  }

  h1 {
    margin: 0;
    font-size: 30px;
  }

  #res {
    display: block;
    min-height: 420px;
    padding: 16px;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: var(--soft);
    overflow: auto;
  }

  #res:empty::before {
    content: "好友动态加载中...";
    color: var(--muted);
  }

  @media (max-width: 680px) {
    .topbar,
    .section-head { align-items: flex-start; flex-direction: column; }
    nav { justify-content: flex-start; }
    .content { padding: 22px; }
    .publish-link { width: 100%; text-align: center; }
  }
</style>
</head>
<body>
  <div class="page">
    <header class="topbar">
      <div class="brand"><span class="brand-mark">W</span><span>WeChat v1</span></div>
      <nav aria-label="主导航">
        <a href="my.html">我的主页</a>
        <a href="sh.html">好友搜索</a>
        <a href="friends.html">好友列表</a>
        <a href="friendgroup.html">发布动态</a>
        <a href="peng.html" class="active">好友动态</a>
        <a href="login.html">登录</a>
      </nav>
    </header>

    <main class="content">
      <div class="section-head">
        <h1>好友动态</h1>
        <a class="publish-link" href="friendgroup.html">发布动态</a>
      </div>
      <span id="res"></span>
    </main>
  </div>
</body>
</html>
