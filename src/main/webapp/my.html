<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我的主页 - WeChat v1</title>
<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.1.1/jquery.min.js"></script>
<script src="my.js"></script>
<style>
  :root {
    --green: #17b26a;
    --green-dark: #0f8f56;
    --blue: #3b82f6;
    --ink: #1f2937;
    --muted: #6b7280;
    --line: #e5e7eb;
    --soft: #f8fafc;
    --surface: rgba(255, 255, 255, 0.94);
    --shadow: 0 18px 50px rgba(15, 23, 42, 0.1);
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    font-family: "Segoe UI", "Microsoft YaHei", Arial, sans-serif;
    color: var(--ink);
    background:
      radial-gradient(circle at 8% 8%, rgba(23, 178, 106, 0.15), transparent 28%),
      radial-gradient(circle at 92% 12%, rgba(59, 130, 246, 0.13), transparent 28%),
      linear-gradient(135deg, #f7fbf8, #f8fafc);
  }

  .page {
    width: min(1120px, calc(100% - 32px));
    margin: 0 auto;
    padding: 24px 0 48px;
  }

  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 20px;
    margin-bottom: 26px;
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 10px;
    font-weight: 800;
  }

  .brand-mark {
    display: grid;
    place-items: center;
    width: 38px;
    height: 38px;
    border-radius: 10px;
    color: #fff;
    background: linear-gradient(135deg, var(--green), var(--blue));
    box-shadow: 0 10px 24px rgba(23, 178, 106, 0.24);
  }

  nav {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: flex-end;
  }

  nav a {
    color: var(--muted);
    text-decoration: none;
    padding: 9px 12px;
    border-radius: 8px;
    font-size: 14px;
  }

  nav a:hover,
  nav a.active {
    color: var(--green-dark);
    background: rgba(23, 178, 106, 0.1);
  }

  .shell {
    display: grid;
    grid-template-columns: 280px minmax(0, 1fr);
    gap: 22px;
  }

  .profile-card,
  .content {
    background: var(--surface);
    border: 1px solid rgba(255, 255, 255, 0.76);
    border-radius: 8px;
    box-shadow: var(--shadow);
    backdrop-filter: blur(16px);
  }

  .profile-card {
    padding: 24px;
    align-self: start;
  }

  .avatar {
    display: grid;
    place-items: center;
    width: 76px;
    height: 76px;
    border-radius: 18px;
    color: #fff;
    font-size: 30px;
    font-weight: 900;
    background: linear-gradient(135deg, var(--green), var(--blue));
    margin-bottom: 18px;
  }

  .profile-card h1 {
    margin: 0 0 8px;
    font-size: 24px;
  }

  .profile-card p {
    margin: 0;
    color: var(--muted);
    line-height: 1.65;
  }

  .content {
    padding: 28px;
  }

  .content h2 {
    margin: 0 0 22px;
    font-size: 26px;
  }

  .form-grid {
    display: grid;
    gap: 16px;
    max-width: 560px;
  }

  label {
    display: grid;
    gap: 8px;
    color: var(--muted);
    font-size: 14px;
    font-weight: 700;
  }

  input {
    width: 100%;
    min-height: 46px;
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 11px 13px;
    color: var(--ink);
    font: inherit;
    background: #fff;
    outline: none;
    transition: 0.2s ease;
  }

  input:focus {
    border-color: var(--green);
    box-shadow: 0 0 0 4px rgba(23, 178, 106, 0.14);
  }

  button,
  input[type="button"] {
    min-height: 46px;
    border: 0;
    border-radius: 8px;
    padding: 0 18px;
    color: #fff;
    font: inherit;
    font-weight: 800;
    cursor: pointer;
    background: linear-gradient(135deg, var(--green), var(--green-dark));
    box-shadow: 0 12px 28px rgba(23, 178, 106, 0.24);
  }

  #res {
    display: block;
    margin-top: 18px;
    min-height: 42px;
    padding: 12px 14px;
    border: 1px solid var(--line);
    border-radius: 8px;
    color: var(--muted);
    background: var(--soft);
  }

  @media (max-width: 780px) {
    .topbar { align-items: flex-start; flex-direction: column; }
    nav { justify-content: flex-start; }
    .shell { grid-template-columns: 1fr; }
    .content { padding: 22px; }
  }
</style>
</head>
<body>
  <div class="page">
    <header class="topbar">
      <div class="brand"><span class="brand-mark">W</span><span>WeChat v1</span></div>
      <nav aria-label="主导航">
        <a href="my.html" class="active">我的主页</a>
        <a href="sh.html">好友搜索</a>
        <a href="friends.html">好友列表</a>
        <a href="friendgroup.html">发布动态</a>
        <a href="peng.html">好友动态</a>
        <a href="login.html">登录</a>
      </nav>
    </header>

    <main class="shell">
      <aside class="profile-card">
        <div class="avatar">我</div>
        <h1>我的主页</h1>
        <p>更新邮箱和密码，保存后即可同步到当前账号。</p>
      </aside>

      <section class="content" aria-labelledby="profile-title">
        <h2 id="profile-title">账号设置</h2>
        <div class="form-grid">
          <label for="email">邮箱地址
            <input type="email" name="new_email" id="email" autocomplete="email" placeholder="name@example.com">
          </label>
          <label for="password">新密码
            <input type="password" name="new_password" id="password" autocomplete="new-password" placeholder="请输入新密码">
          </label>
          <input type="button" value="保存修改" id="save" onclick="save()">
        </div>
        <span id="res"></span>
      </section>
    </main>
  </div>
</body>
</html>
