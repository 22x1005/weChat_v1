<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>登录 - WeChat v1</title>
<style>
  :root {
    --green: #17b26a;
    --green-dark: #0f8f56;
    --ink: #1f2937;
    --muted: #6b7280;
    --line: #e5e7eb;
    --surface: rgba(255, 255, 255, 0.92);
    --shadow: 0 18px 50px rgba(15, 23, 42, 0.12);
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    font-family: "Segoe UI", "Microsoft YaHei", Arial, sans-serif;
    color: var(--ink);
    background:
      radial-gradient(circle at 14% 8%, rgba(23, 178, 106, 0.18), transparent 28%),
      radial-gradient(circle at 88% 18%, rgba(59, 130, 246, 0.14), transparent 30%),
      linear-gradient(135deg, #f7fbf8 0%, #eef6f3 48%, #f8fafc 100%);
  }

  .page {
    width: min(1040px, calc(100% - 32px));
    margin: 0 auto;
    padding: 28px 0 48px;
  }

  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 20px;
    margin-bottom: 48px;
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 10px;
    font-weight: 800;
    letter-spacing: 0;
  }

  .brand-mark {
    display: grid;
    place-items: center;
    width: 38px;
    height: 38px;
    border-radius: 10px;
    color: #fff;
    background: linear-gradient(135deg, var(--green), #3b82f6);
    box-shadow: 0 10px 24px rgba(23, 178, 106, 0.28);
  }

  nav {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: flex-end;
  }

  nav a {
    color: var(--muted);
    text-decoration: none;
    padding: 9px 12px;
    border-radius: 8px;
    font-size: 14px;
    transition: 0.2s ease;
  }

  nav a:hover,
  nav a.active {
    color: var(--green-dark);
    background: rgba(23, 178, 106, 0.1);
  }

  main {
    display: grid;
    grid-template-columns: minmax(0, 1fr) 420px;
    align-items: center;
    gap: 48px;
  }

  .hero h1 {
    margin: 0 0 14px;
    font-size: clamp(36px, 7vw, 68px);
    line-height: 0.98;
  }

  .hero p {
    max-width: 520px;
    margin: 0;
    color: var(--muted);
    font-size: 17px;
    line-height: 1.75;
  }

  .panel {
    background: var(--surface);
    border: 1px solid rgba(255, 255, 255, 0.72);
    border-radius: 8px;
    box-shadow: var(--shadow);
    padding: 32px;
    backdrop-filter: blur(18px);
  }

  .panel h2 {
    margin: 0 0 22px;
    font-size: 24px;
  }

  form {
    display: grid;
    gap: 16px;
  }

  label {
    display: grid;
    gap: 8px;
    color: var(--muted);
    font-size: 14px;
    font-weight: 700;
  }

  input {
    width: 100%;
    min-height: 46px;
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 11px 13px;
    color: var(--ink);
    font: inherit;
    background: #fff;
    outline: none;
    transition: 0.2s ease;
  }

  input:focus {
    border-color: var(--green);
    box-shadow: 0 0 0 4px rgba(23, 178, 106, 0.14);
  }

  input[type="submit"] {
    border: 0;
    color: #fff;
    font-weight: 800;
    cursor: pointer;
    background: linear-gradient(135deg, var(--green), var(--green-dark));
    box-shadow: 0 12px 28px rgba(23, 178, 106, 0.28);
  }

  input[type="submit"]:hover {
    transform: translateY(-1px);
    box-shadow: 0 16px 32px rgba(23, 178, 106, 0.32);
  }

  .switch {
    margin-top: 18px;
    color: var(--muted);
    font-size: 14px;
    text-align: center;
  }

  .switch a {
    color: var(--green-dark);
    font-weight: 800;
    text-decoration: none;
  }

  @media (max-width: 760px) {
    .topbar { align-items: flex-start; flex-direction: column; margin-bottom: 28px; }
    nav { justify-content: flex-start; }
    main { grid-template-columns: 1fr; gap: 28px; }
    .panel { padding: 24px; }
  }
</style>
</head>
<body>
  <div class="page">
    <header class="topbar">
      <div class="brand"><span class="brand-mark">W</span><span>WeChat v1</span></div>
      <nav aria-label="主导航">
        <a href="my.html">我的主页</a>
        <a href="sh.html">好友搜索</a>
        <a href="friends.html">好友列表</a>
        <a href="login.html" class="active">登录</a>
      </nav>
    </header>

    <main>
      <section class="hero">
        <h1>轻松连接好友</h1>
        <p>登录后管理个人信息、搜索好友、查看好友列表，并开始简洁流畅的聊天体验。</p>
      </section>

      <section class="panel" aria-labelledby="login-title">
        <h2 id="login-title">用户登录</h2>
        <form action="/weChat_v1/Login" method="post">
          <label for="email">邮箱地址
            <input type="email" name="email" id="email" autocomplete="email" placeholder="name@example.com">
          </label>
          <label for="password">密码
            <input type="password" name="password" id="password" autocomplete="current-password" placeholder="请输入密码">
          </label>
          <input type="submit" value="登录" id="login">
        </form>
        <p class="switch">还没有账号？ <a href="add.html">立即注册</a></p>
      </section>
    </main>
  </div>
</body>
</html>
