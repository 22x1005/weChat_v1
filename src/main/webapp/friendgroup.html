<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>发布动态 - WeChat v1</title>
<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.1.1/jquery.min.js"></script>
<script src="friendgroup.js"></script>
<style>
  :root {
    --green: #17b26a;
    --green-dark: #0f8f56;
    --blue: #3b82f6;
    --ink: #1f2937;
    --muted: #6b7280;
    --line: #e5e7eb;
    --soft: #f8fafc;
    --surface: rgba(255, 255, 255, 0.94);
    --shadow: 0 18px 50px rgba(15, 23, 42, 0.1);
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    font-family: "Segoe UI", "Microsoft YaHei", Arial, sans-serif;
    color: var(--ink);
    background:
      radial-gradient(circle at 8% 8%, rgba(23, 178, 106, 0.15), transparent 28%),
      radial-gradient(circle at 92% 12%, rgba(59, 130, 246, 0.13), transparent 28%),
      linear-gradient(135deg, #f7fbf8, #f8fafc);
  }

  .page {
    width: min(1120px, calc(100% - 32px));
    margin: 0 auto;
    padding: 24px 0 48px;
  }

  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 20px;
    margin-bottom: 26px;
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 10px;
    font-weight: 800;
  }

  .brand-mark {
    display: grid;
    place-items: center;
    width: 38px;
    height: 38px;
    border-radius: 10px;
    color: #fff;
    background: linear-gradient(135deg, var(--green), var(--blue));
    box-shadow: 0 10px 24px rgba(23, 178, 106, 0.24);
  }

  nav {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: flex-end;
  }

  nav a {
    color: var(--muted);
    text-decoration: none;
    padding: 9px 12px;
    border-radius: 8px;
    font-size: 14px;
  }

  nav a:hover,
  nav a.active {
    color: var(--green-dark);
    background: rgba(23, 178, 106, 0.1);
  }

  .content {
    display: grid;
    grid-template-columns: minmax(0, 1fr) 300px;
    gap: 22px;
  }

  .composer,
  .side {
    background: var(--surface);
    border: 1px solid rgba(255, 255, 255, 0.76);
    border-radius: 8px;
    box-shadow: var(--shadow);
    padding: 30px;
    backdrop-filter: blur(16px);
  }

  h1 {
    margin: 0 0 8px;
    font-size: 30px;
  }

  p {
    margin: 0;
    color: var(--muted);
    line-height: 1.7;
  }

  label {
    display: block;
    margin: 26px 0 10px;
    color: var(--muted);
    font-size: 14px;
    font-weight: 800;
  }

  textarea {
    width: 100%;
    min-height: 220px;
    resize: vertical;
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 14px;
    color: var(--ink);
    font: inherit;
    line-height: 1.7;
    background: #fff;
    outline: none;
    transition: 0.2s ease;
  }

  textarea:focus {
    border-color: var(--green);
    box-shadow: 0 0 0 4px rgba(23, 178, 106, 0.14);
  }

  .actions {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-top: 16px;
  }

  button {
    min-height: 46px;
    border: 0;
    border-radius: 8px;
    padding: 0 20px;
    color: #fff;
    font: inherit;
    font-weight: 800;
    cursor: pointer;
    background: linear-gradient(135deg, var(--green), var(--green-dark));
    box-shadow: 0 12px 28px rgba(23, 178, 106, 0.24);
  }

  #res {
    color: var(--muted);
    font-size: 14px;
  }

  .side {
    align-self: start;
    background: linear-gradient(180deg, rgba(255, 255, 255, 0.95), rgba(248, 250, 252, 0.95));
  }

  .side h2 {
    margin: 0 0 12px;
    font-size: 20px;
  }

  @media (max-width: 780px) {
    .topbar { align-items: flex-start; flex-direction: column; }
    nav { justify-content: flex-start; }
    .content { grid-template-columns: 1fr; }
    .composer,
    .side { padding: 22px; }
    .actions { align-items: stretch; flex-direction: column; }
    button { width: 100%; }
  }
</style>
</head>
<body>
  <div class="page">
    <header class="topbar">
      <div class="brand"><span class="brand-mark">W</span><span>WeChat v1</span></div>
      <nav aria-label="主导航">
        <a href="my.html">我的主页</a>
        <a href="sh.html">好友搜索</a>
        <a href="friends.html">好友列表</a>
        <a href="friendgroup.html" class="active">发布动态</a>
        <a href="peng.html">好友动态</a>
        <a href="login.html">登录</a>
      </nav>
    </header>

    <main class="content">
      <section class="composer" aria-labelledby="compose-title">
        <h1 id="compose-title">发布动态</h1>
        <p>写下想分享的内容，发布后好友可以在动态页看到。</p>
        <label for="content">动态内容</label>
        <textarea id="content" placeholder="今天想和好友分享什么？"></textarea>
        <div class="actions">
          <button id="friendgroup" type="button">发布</button>
          <span id="res"></span>
        </div>
      </section>

      <aside class="side">
        <h2>分享状态</h2>
        <p>内容发布后，右侧状态会显示服务器返回结果。页面只负责界面，原有发布逻辑保持不变。</p>
      </aside>
    </main>
  </div>
</body>
</html>
