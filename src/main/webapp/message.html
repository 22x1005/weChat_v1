<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>聊天 - WeChat v1</title>
<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.1.1/jquery.min.js"></script>
<script src="message.js"></script>
<style>
  :root {
    --green: #17b26a;
    --green-dark: #0f8f56;
    --blue: #3b82f6;
    --ink: #1f2937;
    --muted: #6b7280;
    --line: #e5e7eb;
    --soft: #f8fafc;
    --surface: rgba(255, 255, 255, 0.94);
    --shadow: 0 18px 50px rgba(15, 23, 42, 0.1);
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    font-family: "Segoe UI", "Microsoft YaHei", Arial, sans-serif;
    color: var(--ink);
    background:
      radial-gradient(circle at 8% 8%, rgba(23, 178, 106, 0.15), transparent 28%),
      radial-gradient(circle at 92% 12%, rgba(59, 130, 246, 0.13), transparent 28%),
      linear-gradient(135deg, #f7fbf8, #f8fafc);
  }

  .page {
    width: min(1120px, calc(100% - 32px));
    margin: 0 auto;
    padding: 24px 0 48px;
  }

  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 20px;
    margin-bottom: 26px;
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 10px;
    font-weight: 800;
  }

  .brand-mark {
    display: grid;
    place-items: center;
    width: 38px;
    height: 38px;
    border-radius: 10px;
    color: #fff;
    background: linear-gradient(135deg, var(--green), var(--blue));
    box-shadow: 0 10px 24px rgba(23, 178, 106, 0.24);
  }

  nav {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: flex-end;
  }

  nav a {
    color: var(--muted);
    text-decoration: none;
    padding: 9px 12px;
    border-radius: 8px;
    font-size: 14px;
  }

  nav a:hover {
    color: var(--green-dark);
    background: rgba(23, 178, 106, 0.1);
  }

  .chat {
    background: var(--surface);
    border: 1px solid rgba(255, 255, 255, 0.76);
    border-radius: 8px;
    box-shadow: var(--shadow);
    backdrop-filter: blur(16px);
    overflow: hidden;
  }

  .chat-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    padding: 22px 24px;
    border-bottom: 1px solid var(--line);
    background: rgba(248, 250, 252, 0.72);
  }

  .chat-title h1 {
    margin: 0 0 4px;
    font-size: 26px;
  }

  .chat-title p {
    margin: 0;
    color: var(--muted);
    font-size: 14px;
  }

  .status {
    padding: 7px 10px;
    border-radius: 8px;
    color: var(--green-dark);
    font-size: 13px;
    font-weight: 800;
    background: rgba(23, 178, 106, 0.1);
    white-space: nowrap;
  }

  #history {
    width: 100%;
    height: min(56vh, 520px);
    min-height: 320px;
    padding: 20px;
    border: 0;
    overflow: auto;
    background:
      linear-gradient(rgba(255,255,255,0.88), rgba(255,255,255,0.88)),
      linear-gradient(135deg, rgba(23,178,106,0.08), rgba(59,130,246,0.07));
  }

  #history:empty::before {
    content: "聊天记录加载中...";
    color: var(--muted);
  }

  .composer {
    display: grid;
    grid-template-columns: minmax(0, 1fr) auto;
    gap: 12px;
    padding: 16px;
    border-top: 1px solid var(--line);
    background: #fff;
  }

  label {
    position: absolute;
    width: 1px;
    height: 1px;
    overflow: hidden;
    clip: rect(0 0 0 0);
  }

  input[type="text"] {
    width: 100%;
    min-height: 48px;
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 11px 13px;
    color: var(--ink);
    font: inherit;
    background: var(--soft);
    outline: none;
    transition: 0.2s ease;
  }

  input[type="text"]:focus {
    border-color: var(--green);
    box-shadow: 0 0 0 4px rgba(23, 178, 106, 0.14);
    background: #fff;
  }

  input[type="button"] {
    min-height: 48px;
    border: 0;
    border-radius: 8px;
    padding: 0 22px;
    color: #fff;
    font: inherit;
    font-weight: 800;
    cursor: pointer;
    background: linear-gradient(135deg, var(--green), var(--green-dark));
    box-shadow: 0 12px 28px rgba(23, 178, 106, 0.24);
  }

  @media (max-width: 680px) {
    .topbar,
    .chat-head { align-items: flex-start; flex-direction: column; }
    nav { justify-content: flex-start; }
    .composer { grid-template-columns: 1fr; }
    input[type="button"] { width: 100%; }
  }
</style>
</head>
<body>
  <div class="page">
    <header class="topbar">
      <div class="brand"><span class="brand-mark">W</span><span>WeChat v1</span></div>
      <nav aria-label="主导航">
        <a href="my.html">我的主页</a>
        <a href="sh.html">好友搜索</a>
        <a href="friends.html">好友列表</a>
        <a href="friendgroup.html">发布动态</a>
        <a href="peng.html">好友动态</a>
        <a href="login.html">登录</a>
      </nav>
    </header>

    <main class="chat">
      <section class="chat-head">
        <div class="chat-title">
          <h1>聊天</h1>
          <p>历史消息会自动刷新，输入内容后发送。</p>
        </div>
        <span class="status">在线</span>
      </section>

      <div id="history"></div>

      <section class="composer">
        <label for="content">发送消息</label>
        <input type="text" name="message" id="content" placeholder="输入消息，按 Enter 发送">
        <input type="button" value="发送" id="send">
      </section>
    </main>
  </div>
</body>
</html>
